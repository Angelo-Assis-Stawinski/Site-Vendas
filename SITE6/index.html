<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nerdware</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark">
  <header>
    <h1>Nerdware</h1>
    <nav>
      <ul>
        <li><a href="#">Início</a></li>
        <li><a href="#">Categorias</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>
    <div class="theme-toggle">
      <button id="toggle-theme">🌙</button>
      <span id="theme-label">Tema claro</span>
    </div>
  </header>

  <section class="hero">
    <h2>Hardware e Acessórios para Computador</h2>
    <p>Produtos selecionados para quem ama tecnologia</p>
  </section>

  <section class="categorias">
    <h3>Categorias</h3>
    <div class="grid">
      <div class="card">Monitores</div>
      <div class="card">Teclados</div>
      <div class="card">Mouses</div>
      <div class="card">Headsets</div>
    </div>
  </section>

  <section class="produtos">
    <h3>Produtos em Destaque</h3>
    <div class="grid" id="produtos-container">
      <!-- Produtos via JavaScript -->
    </div>
  </section>

  <footer>
    <p>&copy; 2025 Nerdware</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
